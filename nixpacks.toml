[phases.setup]
nixPkgs = ["...", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build",
    "pip3 install google-api-python-client",
]

[phases.build]
cmds = [
    "php artisan optimize",
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
